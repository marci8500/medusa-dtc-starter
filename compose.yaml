migrate:
  <<: *medusa
  restart: "no"
  environment:
    DATABASE_POOL_MIN: "2"
    DATABASE_POOL_MAX: "50"
    DB_MIGRATION_CONCURRENCY: "1"
  command:
    - sh
    - -c
    - |
      set -eu
      echo "Running Medusa database migrations..."
      pnpm exec medusa db:migrate
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

server:
  <<: *medusa
  restart: unless-stopped
  environment:
    MEDUSA_WORKER_MODE: server
    DISABLE_MEDUSA_ADMIN: "false"
    DATABASE_POOL_MIN: "2"
    DATABASE_POOL_MAX: "10"
  ports:
    - "9000"
  depends_on:
    migrate:
      condition: service_completed_successfully
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:9000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
      ]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 30s

worker:
  <<: *medusa
  restart: unless-stopped
  environment:
    MEDUSA_WORKER_MODE: worker
    DISABLE_MEDUSA_ADMIN: "true"
    DATABASE_POOL_MIN: "2"
    DATABASE_POOL_MAX: "10"
  depends_on:
    migrate:
      condition: service_completed_successfully