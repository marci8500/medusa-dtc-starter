name: medusa

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

  uploads-init:
    image: alpine:3.21
    restart: "no"
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -eu

        mkdir -p /uploads
        chown -R 1000:1000 /uploads
        chmod -R 775 /uploads

        echo "Upload directory initialized."
    volumes:
      - medusa_uploads:/uploads

  migrate:
    image: medusa-dokploy:${MEDUSA_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.medusa
      args:
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_POOL_MIN: "1"
      DATABASE_POOL_MAX: "30"
      DB_MIGRATION_CONCURRENCY: "1"
      DISABLE_MEDUSA_ADMIN: "true"
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -eu

        test -n "$${DATABASE_URL:-}" || {
          echo "ERROR: DATABASE_URL is missing"
          exit 1
        }

        test -n "$${REDIS_URL:-}" || {
          echo "ERROR: REDIS_URL is missing"
          exit 1
        }

        echo "Running Medusa database migrations..."
        pnpm exec medusa db:migrate
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    image: medusa-dokploy:${MEDUSA_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.medusa
      args:
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MEDUSA_WORKER_MODE: server
      DISABLE_MEDUSA_ADMIN: "false"
      DATABASE_POOL_MIN: "1"
      DATABASE_POOL_MAX: "10"
    volumes:
      - medusa_uploads:/server/static
    restart: unless-stopped
    expose:
      - "9000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      uploads-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch("http://127.0.0.1:9000/health")
          .then((response) => {
            if (!response.ok) {
              process.exit(1)
            }
          })
          .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    image: medusa-dokploy:${MEDUSA_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.medusa
      args:
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MEDUSA_WORKER_MODE: worker
      DISABLE_MEDUSA_ADMIN: "true"
      DATABASE_POOL_MIN: "1"
      DATABASE_POOL_MAX: "10"
    volumes:
      - medusa_uploads:/server/static
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      uploads-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  medusa_uploads: