name: medusa

x-medusa: &medusa
  image: medusa-dokploy:${MEDUSA_IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile.medusa
    args:
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
  env_file:
    - .env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    <<: *medusa
    restart: "no"
    command: ["pnpm", "medusa", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    <<: *medusa
    restart: unless-stopped
    environment:
      MEDUSA_WORKER_MODE: server
      DISABLE_MEDUSA_ADMIN: "false"
    ports:
      - "9000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *medusa
    restart: unless-stopped
    environment:
      MEDUSA_WORKER_MODE: worker
      DISABLE_MEDUSA_ADMIN: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data: